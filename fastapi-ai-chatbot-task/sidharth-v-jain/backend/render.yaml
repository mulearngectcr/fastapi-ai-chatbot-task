services:
  - type: web
    name: ai-chatbot-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: BACKEND_API_KEY
        sync: false
      - key: SYSTEM_PROMPT
        sync: false
